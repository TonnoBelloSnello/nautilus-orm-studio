name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package artifacts
        shell: pwsh
        run: |
          $packageDir = "release-package"
          $assetName = "nautilus-orm-studio-${{ github.ref_name }}-${{ matrix.platform }}.zip"

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null

          Copy-Item -Recurse -Force .next $packageDir
          Copy-Item package.json $packageDir

          if (Test-Path package-lock.json) {
            Copy-Item package-lock.json $packageDir
          }

          if (Test-Path next.config.ts) {
            Copy-Item next.config.ts $packageDir
          }

          if (Test-Path next.config.js) {
            Copy-Item next.config.js $packageDir
          }

          if (Test-Path public) {
            Copy-Item -Recurse -Force public $packageDir
          }

          Compress-Archive -Path $packageDir -DestinationPath $assetName -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-${{ matrix.platform }}
          path: nautilus-orm-studio-${{ github.ref_name }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: dist/**/*.zip
